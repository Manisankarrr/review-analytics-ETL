name: ETL Pipeline

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  run-etl:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      AIVEN_HOST: ${{ secrets.AIVEN_HOST }}
      AIVEN_PORT: ${{ secrets.AIVEN_PORT }}
      AIVEN_DATABASE: ${{ secrets.AIVEN_DATABASE }}
      AIVEN_USER: ${{ secrets.AIVEN_USER }}
      AIVEN_PASSWORD: ${{ secrets.AIVEN_PASSWORD }}
      AIVEN_SSL_CA_PATH: ${{ secrets.AIVEN_SSL_CA_PATH }}
      GOOGLE_PLAY_APP_ID: ${{ secrets.GOOGLE_PLAY_APP_ID }}
      GOOGLE_PLAY_LANG: ${{ secrets.GOOGLE_PLAY_LANG }}
      GOOGLE_PLAY_COUNTRY: ${{ secrets.GOOGLE_PLAY_COUNTRY }}
      REVIEWS_PER_RUN: ${{ secrets.REVIEWS_PER_RUN }}
      LOG_LEVEL: INFO

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run extract stage
        run: python -m etl.extract

      - name: Run transform stage
        run: python -m etl.transform

      - name: Run load stage
        run: python -m etl.load

      - name: Upload run artifacts (raw/processed data + logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etl-run-${{ github.run_id }}
          path: |
            data/raw/
            data/processed/
          retention-days: 14